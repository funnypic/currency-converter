name: Update S&P 500 Data

on:
  schedule:
    - cron: '0 */6 * * *'  # 6시간마다 자동 업데이트
  workflow_dispatch:         # 수동 실행 가능
  push:
    branches: [main]
    paths:
      - '*.html'
      - '*.js'
      - '*.css'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch S&P 500 data
        run: |
          python3 - <<'EOF'
          import json, urllib.request, datetime

          url = "https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC?interval=1d&range=1y"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req) as r:
              data = json.load(r)

          result = data["chart"]["result"][0]
          meta = result["meta"]
          timestamps = result["timestamp"]
          closes = result["indicators"]["quote"][0]["close"]

          history = []
          for ts, close in zip(timestamps, closes):
              if close is not None:
                  date = datetime.datetime.utcfromtimestamp(ts).strftime("%Y-%m-%d")
                  history.append({"date": date, "close": round(close, 2)})

          output = {
              "price": meta["regularMarketPrice"],
              "prevClose": meta.get("previousClose") or meta.get("chartPreviousClose"),
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC"),
              "history": history
          }
          with open("snp500.json", "w") as f:
              json.dump(output, f)
          print("Done:", output["price"], "updated:", output["updated"])
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snp500.json
          git diff --staged --quiet || git commit -m "Update S&P 500 data [skip ci]" && git push
